<svg width="400" height="19" viewBox="0 0 400 19" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text { font-family: 'Ubuntu Mono', monospace; font-weight: 600; font-size: 20px; fill: #FFFFFF; }
    .slider { animation: slide 14s infinite cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes slide {
      0%, 10%   { transform: translateY(0); }
      14%, 24%  { transform: translateY(-24px); }
      28%, 38%  { transform: translateY(-48px); }
      42%, 52%  { transform: translateY(-72px); }
      56%, 66%  { transform: translateY(-96px); }
      70%, 80%  { transform: translateY(-120px); }
      84%, 94%  { transform: translateY(-144px); }
      100%      { transform: translateY(-168px); }
    }
  </style>
  
  <clipPath id="window">
    <rect width="400" height="19" y="0" />
  </clipPath>

  <g clip-path="url(#window)">
    <g class="slider">
      <text class="text" x="0" y="15">OSINT</text>
      <text class="text" x="0" y="39">FININT</text>
      <text class="text" x="0" y="63">CYBINT</text>
      <text class="text" x="0" y="87">MASINT</text>
      <text class="text" x="0" y="111">TECHINT</text>
      <text class="text" x="0" y="135">IMINT</text>
      <text class="text" x="0" y="159">GEOINT</text>
      <text class="text" x="0" y="183">OSINT</text> 
    </g>
  </g>
</svg>
